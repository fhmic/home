<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FM — Bank Reconciliation Engine</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;color:#e8edf5;font-family:sans-serif}
</style>
</head>

<body>

<div id="bar">
  <div>FM BankRecon App</div>

  <div>
    <span id="stx">FM BankRecon — Ready</span>

    <span id="user-display">User</span>

    <a href="../">Home</a>
    <a href="../portal/">Portal</a>

    <button id="logout-btn">Sign out</button>
  </div>
</div>

<div id="main"></div>

<div id="ft">
  © <span id="yr"></span> Michael Felix Happy
</div>

<div id="ld">
  <div id="ldm">Processing...</div>
</div>

<script>
'use strict';

const _API = 'https://eis-recbackend.onrender.com/api';

(function(){
  const tok = sessionStorage.getItem('FM_token');
  if(!tok){ window.location.href='../portal/'; }
})();

let _token = sessionStorage.getItem('FM_token');

async function _apiFetch(path, opts){
  opts = opts||{};
  const headers = {'Content-Type':'application/json',...(opts.headers||{})};
  if(_token) headers['Authorization']='Bearer '+_token;
  const res = await fetch(_API+path,{...opts,headers});
  const data = await res.json();
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}

(async function(){
  try{
    const data = await _apiFetch('/auth/me');
    document.getElementById('user-display').textContent = data.user.name;
  } catch(e){
    sessionStorage.removeItem('FM_token');
    window.location.href='../portal/';
  }
})();

document.getElementById('logout-btn').addEventListener('click',function(){
  if(!confirm('Sign out?')) return;
  sessionStorage.removeItem('FM_token');
  window.location.href='../portal/';
});

document.getElementById('yr').textContent=new Date().getFullYear();
</script>

</body>
</html>
