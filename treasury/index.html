<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FSCF Treasury Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07101f;color:#e2eaf5;font-family:'Syne',sans-serif;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#1a2e4a;border-radius:2px}
:root{--navy:#07101f;--card:#0d1b2e;--border:#1a2e4a;--teal:#00c9a7;--gold:#f5a623;--red:#ff4560;--green:#06d6a0;--blue:#4cc9f0;--purple:#9b5de5;--t1:#e2eaf5;--t2:#7a90b0;--t3:#4a607a}
.mono{font-family:'IBM Plex Mono',monospace}
/* NAV */
#topnav{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px}
.brand{display:flex;align-items:center;gap:10px;min-width:190px}
.brand-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.brand-name{font-size:11px;font-weight:800;letter-spacing:-.01em;line-height:1.3}
.brand-sub{font-size:9px;color:var(--t3);font-family:'IBM Plex Mono',monospace;letter-spacing:.05em}
.navtabs{display:flex;gap:2px}
.navtab{background:transparent;border:1px solid transparent;border-radius:6px;padding:5px 11px;font-size:11px;color:var(--t2);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s;white-space:nowrap}
.navtab:hover{background:rgba(0,201,167,.08);color:var(--teal)}
.navtab.active{background:rgba(0,201,167,.12);color:var(--teal);border-color:rgba(0,201,167,.3)}
.nav-right{display:flex;align-items:center;gap:8px;min-width:190px;justify-content:flex-end}
.upload-btn{background:var(--teal);color:#000;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;display:none}
.time-badge{background:var(--navy);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:9px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#9b5de5,#4cc9f0);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer}
/* MAIN */
#main{padding:24px;max-width:1400px;margin:0 auto;padding-bottom:52px}
.panel{display:none}.panel.active{display:block}
/* STATUS BAR */
#statusbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.sb-items{display:flex;gap:20px}
.sb-item{display:flex;gap:5px;align-items:center}
.sb-label{font-size:9px;color:var(--t3);font-family:'IBM Plex Mono',monospace;text-transform:uppercase}
.sb-val{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.sb-right{display:flex;align-items:center;gap:6px}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* SECTION HEADER */
.sec-head{margin-bottom:20px}
.sec-title{font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--t1)}
.sec-sub{font-size:11px;color:var(--t2);margin-top:4px;font-family:'IBM Plex Mono',monospace}
/* KPI GRID */
.kpi-grid{display:grid;gap:12px;margin-bottom:20px}
.kpi-grid-3{grid-template-columns:repeat(3,1fr)}
.kpi-grid-4{grid-template-columns:repeat(4,1fr)}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kpi-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:10px 0 0 10px}
.kpi-label{font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.kpi-value{font-size:21px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-.02em;color:var(--t1)}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:4px}
.kpi-delta{font-size:10px;margin-top:4px;font-family:'IBM Plex Mono',monospace}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card-label{font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.chart-wrap{position:relative}
/* GRID LAYOUTS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-2-3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.grid-3-2{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:16px}
/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--t2);font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(26,46,74,.3);transition:background .12s}
tbody tr:hover{background:#112240}
tbody td{padding:9px 12px;white-space:nowrap;font-size:12px}
.tr{text-align:right}
/* BADGES */
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600;display:inline-block}
.badge-s1{color:#06d6a0;background:#0d2b23;border:1px solid rgba(6,214,160,.25)}
.badge-s2{color:#f5a623;background:#2b200a;border:1px solid rgba(245,166,35,.25)}
.badge-s3{color:#ff4560;background:#2b0d12;border:1px solid rgba(255,69,96,.25)}
/* FILTERS */
.filter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.filter-btns{display:flex;gap:6px}
.fbtn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--t2);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:600}
.fbtn.active{background:var(--teal);color:#000;border-color:var(--teal)}
.search-input{background:var(--navy);border:1px solid var(--border);border-radius:6px;color:var(--t1);padding:6px 12px;font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;width:220px}
/* TABLE FOOTER */
.tbl-footer{margin-top:10px;color:var(--t3);font-size:10px;font-family:'IBM Plex Mono',monospace}
.tbl-total{margin-top:10px;padding:10px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
/* STAGE BARS */
.stage-item{margin-bottom:14px}
.stage-row{display:flex;justify-content:space-between;margin-bottom:4px}
.stage-track{background:var(--navy);border-radius:4px;height:8px;overflow:hidden}
.stage-fill{height:100%;border-radius:4px;transition:width .6s ease}
.stage-pct{color:var(--t3);font-size:10px;margin-top:3px;font-family:'IBM Plex Mono',monospace}
/* STRESS */
.stress-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.stress-label{color:var(--t2);font-size:11px;margin-bottom:8px}
.stress-row{display:flex;align-items:center;gap:12px}
.stress-row input[type=range]{flex:1;accent-color:var(--teal)}
.stress-val{font-family:'IBM Plex Mono',monospace;font-size:12px;min-width:55px}
.stress-result{color:var(--t3);font-size:10px;margin-top:6px;font-family:'IBM Plex Mono',monospace}
/* LIQUIDITY SOURCES */
.liq-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(26,46,74,.3)}
.liq-item-left{display:flex;align-items:center;gap:8px}
.liq-bar-left{width:3px;height:16px;border-radius:2px}
.liq-item-label{color:var(--t2);font-size:12px}
.liq-item-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600}
/* UPLOAD MODAL */
#upload-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
#upload-modal.show{display:flex}
.modal-box{background:var(--card);border:1px solid #243a5e;border-radius:14px;padding:28px;width:460px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:700;color:var(--t1)}
.modal-sub{font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.modal-close{background:none;border:none;color:var(--t2);cursor:pointer;font-size:20px;line-height:1}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:border-color .2s}
.drop-zone:hover,.drop-zone.over{border-color:var(--teal)}
.drop-icon{font-size:36px;margin-bottom:10px}
.drop-title{color:var(--t1);font-size:13px;margin-bottom:4px}
.drop-sub{color:var(--t3);font-size:11px}
.upload-log{background:var(--navy);border-radius:8px;padding:14px;margin-bottom:14px;max-height:160px;overflow-y:auto;font-size:11px}
.log-row{display:flex;gap:10px;padding:4px 0;border-bottom:1px solid rgba(26,46,74,.2)}
.log-ok{color:var(--green);font-family:'IBM Plex Mono',monospace}
.log-warn{color:var(--gold);font-family:'IBM Plex Mono',monospace}
.log-row-num{color:var(--t3);font-family:'IBM Plex Mono',monospace}
.confirm-btn{width:100%;background:var(--teal);color:#000;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace}
/* COLORS for JS */
.c-teal{color:var(--teal)}.c-gold{color:var(--gold)}.c-red{color:var(--red)}.c-green{color:var(--green)}.c-blue{color:var(--blue)}.c-purple{color:var(--purple)}.c-t2{color:var(--t2)}.c-t3{color:var(--t3)}
</style>
</head>
<body>

<!-- NAV -->
<nav id="topnav">
  <div class="brand">
    <div class="brand-icon">&#11042;</div>

        <input type="file" accept=".csv,.xlsx" style="display:none" onchange="handleFile(this)"/>

  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const LOANS=[
  {id:"LN-001",customer:"Dangote Industries Ltd",    product:"Invoice Discounting",  principal:450,outstanding:420,rate:22,dpd:0,  stage:1,rating:"A",  start:"2024-01-15",maturity:"2024-07-15"},

  {id:"LN-007",customer:"Nigerian Breweries Plc",     product:"Factoring",            principal:220,outstanding:215,rate:22,dpd:5,  stage:1,rating:"A-", start:"2024-03-20",maturity:"2024-09-20"},
  {id:"LN-008",customer:"Cadbury Nigeria Plc",        product:"Invoice Discounting",  principal:85, outstanding:82, rate:24,dpd:120,stage:3,rating:"CCC",start:"2023-08-01",maturity:"2024-02-01"},
  {id:"LN-009",customer:"PZ Cussons Nigeria",         product:"Factoring",            principal:110,outstanding:108,rate:22,dpd:95, stage:3,rating:"B-", start:"2023-09-10",maturity:"2024-03-10"},
  {id:"LN-010",customer:"Nestle Nigeria Plc",         product:"Supply Chain Finance", principal:340,outstanding:340,rate:20,dpd:0,  stage:1,rating:"AA-",start:"2024-04-01",maturity:"2024-10-01"},
  {id:"LN-011",customer:"NNPC Gas & Power Ltd",       product:"Reverse Factoring",    principal:600,outstanding:580,rate:18,dpd:30, stage:1,rating:"A+", start:"2024-01-20",maturity:"2024-07-20"},
  {id:"LN-012",customer:"Access Bank Plc",            product:"Invoice Discounting",  principal:250,outstanding:250,rate:20,dpd:0,  stage:1,rating:"AA", start:"2024-02-15",maturity:"2024-08-15"},
  {id:"LN-013",customer:"Total Energies Nigeria",     product:"Supply Chain Finance", principal:180,outstanding:172,rate:21,dpd:75, stage:2,rating:"BB", start:"2023-12-01",maturity:"2024-06-01"},
  {id:"LN-014",customer:"Lafarge Africa Plc",         product:"Factoring",            principal:130,outstanding:130,rate:23,dpd:0,  stage:1,rating:"A-", start:"2024-03-01",maturity:"2024-09-01"},
  {id:"LN-015",customer:"Julius Berger Nigeria",      product:"Invoice Discounting",  principal:200,outstanding:195,rate:22,dpd:155,stage:3,rating:"D",  start:"2023-06-15",maturity:"2023-12-15"},
];
const BORROWINGS=[
  {id:"BW-001",lender:"FCMB Ltd",            type:"Term Loan",           principal:500, outstanding:420, rate:19.5,tenor:24,repayment:"Monthly",  maturity:"2025-06-30"},
  {id:"BW-002",lender:"Stanbic IBTC Bank",   type:"Overdraft Facility",  principal:200, outstanding:150, rate:23,  tenor:12,repayment:"Revolving",maturity:"2024-12-31"},
  {id:"BW-003",lender:"DBN Nigeria",          type:"On-lending Facility", principal:800, outstanding:720, rate:14,  tenor:36,repayment:"Quarterly",maturity:"2026-09-30"},
  {id:"BW-004",lender:"Bank of Industry",    type:"SME Fund",            principal:300, outstanding:280, rate:12,  tenor:48,repayment:"Monthly",  maturity:"2027-03-31"},
  {id:"BW-005",lender:"LAPO MfB",            type:"Wholesale Borrowing", principal:150, outstanding:100, rate:21,  tenor:12,repayment:"Monthly",  maturity:"2024-10-31"},
  {id:"BW-006",lender:"Pan-African Holdings",type:"Intercompany Loan",   principal:1000,outstanding:1000,rate:16,  tenor:60,repayment:"Bullet",   maturity:"2028-01-31"},
];
const INVESTMENTS=[
  {id:"INV-001",cp:"Access Bank Plc",  type:"Fixed Deposit",       principal:300,rate:22,  invested:"2024-03-01",days:180,maturity:"2024-08-28"},
  {id:"INV-002",cp:"GTBank Ltd",        type:"Fixed Deposit",       principal:200,rate:21.5,invested:"2024-02-15",days:91, maturity:"2024-05-17"},
  {id:"INV-003",cp:"FGN Bond (10yr)",   type:"Government Security", principal:500,rate:17.5,invested:"2023-10-01",days:365,maturity:"2033-10-01"},
  {id:"INV-004",cp:"NTB (91-day)",      type:"Treasury Bills",      principal:250,rate:20.5,invested:"2024-04-01",days:91, maturity:"2024-07-01"},
  {id:"INV-005",cp:"Zenith Bank Plc",   type:"Fixed Deposit",       principal:150,rate:22,  invested:"2024-04-10",days:60, maturity:"2024-06-09"},
  {id:"INV-006",cp:"NTB (182-day)",     type:"Treasury Bills",      principal:400,rate:21,  invested:"2024-01-15",days:182,maturity:"2024-07-15"},
];
const CASH=[
  {id:"CA-001",bank:"Access Bank Plc",   acct:"001-234567-001",type:"Current", ccy:"NGN",balance:124.5,restricted:false},
  {id:"CA-002",bank:"GTBank Ltd",         acct:"0123456789",   type:"Current", ccy:"NGN",balance:87.3, restricted:false},
  {id:"CA-003",bank:"First Bank Nigeria", acct:"2012345678",   type:"Current", ccy:"NGN",balance:43.8, restricted:true},
  {id:"CA-004",bank:"Zenith Bank Plc",    acct:"1012345678",   type:"Savings", ccy:"NGN",balance:210.0,restricted:false},
  {id:"CA-005",bank:"UBA Plc",            acct:"2012398765",   type:"Current", ccy:"NGN",balance:32.1, restricted:false},
  {id:"CA-006",bank:"Access Bank Plc",    acct:"001-234567-002",type:"Dom (USD)",ccy:"USD",balance:18.4,restricted:false},
];
const CASH_TREND=[410,380,445,398,462,490,517,498];
const CASH_MONTHS=["Nov","Dec","Jan","Feb","Mar","Apr","May","Jun"];
const ECL_TREND_P=[45.2,48.1,52.4,55.8,61.2,67.4];
const ECL_TREND_M=["Jan","Feb","Mar","Apr","May","Jun"];
const LIQ_NET=[498,312,185,-240,420,380,290];
const LIQ_CUM=[498,810,995,755,1175,1555,1845];
const LIQ_P=["Now","30d","60d","90d","120d","150d","180d"];
const GAP_IN=[245,380,510,180,620,850];
const GAP_OUT=[180,420,290,480,210,320];
const GAP_P=["0-7d","8-30d","31-60d","61-90d","91-180d","181-365d"];

// ── UTILS ─────────────────────────────────────────────────────────────────────
const sum=(a,k)=>a.reduce((s,x)=>s+(x[k]||0),0);
const fmt=(n)=>n>=1000?"₦"+(n/1000).toFixed(1)+"B":"₦"+n.toFixed(1)+"M";
const pct=(n)=>n.toFixed(2)+"%";
const C={teal:"#00c9a7",gold:"#f5a623",red:"#ff4560",green:"#06d6a0",blue:"#4cc9f0",purple:"#9b5de5",border:"#1a2e4a",card:"#0d1b2e",navy:"#07101f",t2:"#7a90b0",t3:"#4a607a"};
const PALETTE=[C.teal,C.blue,C.purple,C.gold,C.green,C.red];

// ── ECL ENGINE ─────────────────────────────────────────────────────────────────
const ECL_P={1:{pd12:.02,pdL:.05,lgd:.45},2:{pd12:.15,pdL:.35,lgd:.55},3:{pd12:.75,pdL:.90,lgd:.65}};
function calcECL(loans,mult=1){
  let total=0;
  const rows=loans.map(l=>{
    const p=ECL_P[l.stage];
    const pd=(l.stage===1?p.pd12:p.pdL)*mult;
    const ecl=pd*p.lgd*l.outstanding;
    total+=ecl;
    return{...l,pd,lgd:p.lgd,ead:l.outstanding,ecl:+ecl.toFixed(2),eclRate:+(ecl/l.outstanding*100).toFixed(2)};
  });
  return{rows,total:+total.toFixed(2),ead:+sum(loans,"outstanding").toFixed(2),coverage:+(total/sum(loans,"outstanding")*100).toFixed(2)};
}

// ── CHART.JS DEFAULTS ─────────────────────────────────────────────────────────
Chart.defaults.color=C.t2;
Chart.defaults.borderColor=C.border;
Chart.defaults.font.family="'IBM Plex Mono',monospace";
Chart.defaults.font.size=10;
const chartInstances={};
function makeChart(id,config){
  if(chartInstances[id]){chartInstances[id].destroy();}
  const ctx=document.getElementById(id);
  if(!ctx)return;
  chartInstances[id]=new Chart(ctx,config);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function kpi(label,value,sub,color,delta){
  const deltaHtml=delta!==undefined?'<div class="kpi-delta" style="color:'+(delta>=0?C.green:C.red)+'">'+(delta>=0?"▲":"▼")+Math.abs(delta).toFixed(1)+"% MoM</div>":'';
  return '<div class="kpi-card"><div class="kpi-bar" style="background:'+color+'"></div><div class="kpi-label">'+label+'</div><div class="kpi-value">'+value+'</div>'+(sub?'<div class="kpi-sub">'+sub+'</div>':'')+deltaHtml+'</div>';
}
function stageBadge(s){return'<span class="badge badge-s'+s+'">Stage '+s+'</span>';}
function colorDPD(d){return d>=90?C.red:d>=30?C.gold:C.green;}
function colorRating(r){return(r||"").startsWith("A")?C.green:(r||"").startsWith("B")?C.gold:C.red;}

const UPLOAD_TABS={loans:true,borrowings:true,investments:true,cash:true};
let currentTab="dashboard";
function switchTab(tab){
  document.querySelectorAll(".navtab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id==="panel-"+tab));
  document.getElementById("upload-btn").style.display=UPLOAD_TABS[tab]?"inline-block":"none";
  currentTab=tab;
  renderTab(tab);
}

});

    <td class="tr mono">${fmt(i.principal)}</td>
    <td class="tr mono" style="color:${C.green}">${i.rate}%</td>
    <td class="tr mono">${i.days}d</td>
    <td class="mono" style="color:var(--t2)">${i.invested}</td>
    <td class="mono" style="color:var(--t2)">${i.maturity}</td>
    <td class="tr mono" style="color:${C.gold}">${fmt(i.principal*(i.rate/100)*(i.days/365))}</td>
  </tr>`).join("")}</tbody>
  </table></div></div>`;
  setTimeout(()=>{
    makeChart("ch-inv-ladder",{type:"bar",data:{labels:INVESTMENTS.map(i=>i.cp.split(" ")[0]),datasets:[{label:"Principal",data:INVESTMENTS.map(i=>i.principal),backgroundColor:C.teal,stack:"a"},{label:"Interest",data:INVESTMENTS.map(i=>+(i.principal*(i.rate/100)*(i.days/365)).toFixed(2)),backgroundColor:C.gold,borderRadius:4,stack:"a"}]},options:{plugins:{legend:{labels:{color:C.t2}}},scales:{x:{grid:{color:C.border},stacked:true},y:{grid:{color:C.border},stacked:true}}}});
    makeChart("ch-inv-mix",{type:"doughnut",data:{labels:Object.keys(typeMap),datasets:[{data:Object.values(typeMap),backgroundColor:PALETTE,borderColor:C.card,borderWidth:3}]},options:{plugins:{legend:{labels:{color:C.t2}}}}});
  },50);
}

// ── CASH ──────────────────────────────────────────────────────────────────────
function renderCash(){
  const ngn=CASH.filter(a=>a.ccy==="NGN");
  const usd=CASH.filter(a=>a.ccy==="USD");
  const totalNGN=sum(ngn,"balance"),unres=sum(ngn.filter(a=>!a.restricted),"balance"),res=sum(ngn.filter(a=>a.restricted),"balance"),totalUSD=sum(usd,"balance");
  document.getElementById("panel-cash").innerHTML=`
  <div class="sec-head"><div class="sec-title">Cash Position</div><div class="sec-sub">Real-time treasury balances across all accounts</div></div>
  <div class="kpi-grid kpi-grid-4">
    ${kpi("Total NGN Cash",fmt(totalNGN),"Across 5 NGN accounts",C.teal,1.5)}
    ${kpi("Unrestricted Cash",fmt(unres),"Available for use",C.green)}
    ${kpi("Restricted Cash",fmt(res),"Encumbered",C.red)}
    ${kpi("FX Holdings (USD)","$"+totalUSD.toFixed(1)+"M","≈ ₦"+(totalUSD*1580).toFixed(0)+"M",C.gold)}
  </div>
  <div class="grid-2">
    <div class="card" style="margin:0"><div class="card-label">Cash Trend (₦M)</div><canvas id="ch-cash-trend2" height="180"></canvas></div>
    <div class="card" style="margin:0"><div class="card-label">Cash by Bank (₦M)</div><canvas id="ch-cash-bank" height="180"></canvas></div>
  </div>
  <div class="card" style="margin-top:16px"><div class="card-label">Bank Account Balances</div>
  <div class="tbl-wrap"><table>
  <thead><tr><th>Account ID</th><th>Bank</th><th>Account No.</th><th>Type</th><th>CCY</th><th class="tr">Balance</th><th>Status</th></tr></thead>
  <tbody>${CASH.map(a=>`<tr>
    <td class="mono" style="color:${C.teal}">${a.id}</td>
    <td>${a.bank}</td>
    <td class="mono" style="color:var(--t2)">${a.acct}</td>
    <td style="color:var(--t2)">${a.type}</td>
    <td class="mono" style="color:${a.ccy==="USD"?C.gold:"inherit"}">${a.ccy}</td>
    <td class="tr mono">${a.ccy==="USD"?"$"+a.balance.toFixed(2)+"M":fmt(a.balance)}</td>
    <td class="mono" style="color:${a.restricted?C.red:C.green};font-size:11px">${a.restricted?"🔒 Restricted":"✓ Available"}</td>
  </tr>`).join("")}</tbody>
  </table></div></div>`;
  setTimeout(()=>{
    makeChart("ch-cash-trend2",{type:"line",data:{labels:CASH_MONTHS,datasets:[{label:"Cash (₦M)",data:CASH_TREND,borderColor:C.teal,backgroundColor:"rgba(0,201,167,.15)",fill:true,tension:.4,pointBackgroundColor:C.teal,pointRadius:3}]},options:{plugins:{legend:{display:false}},scales:{x:{grid:{color:C.border}},y:{grid:{color:C.border}}}}});
    const bankD=ngn.map(a=>({bank:a.bank.split(" ")[0],balance:a.balance,restricted:a.restricted}));
    makeChart("ch-cash-bank",{type:"bar",data:{labels:bankD.map(d=>d.bank),datasets:[{data:bankD.map(d=>d.balance),backgroundColor:bankD.map((d,i)=>d.restricted?C.red:PALETTE[i%PALETTE.length]),borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{grid:{color:C.border}},y:{grid:{color:C.border}}}}});
  },50);
}

// ── LIQUIDITY ──────────────────────────────────────────────────────────────────
function renderLiquidity(){
  const totalCash=sum(CASH.filter(a=>a.ccy==="NGN"),"balance");
  const totalInv=sum(INVESTMENTS,"principal");
  const totalDebt=sum(BORROWINGS,"outstanding");
  const totalLoans=sum(LOANS,"outstanding");
  const netLiq=totalCash+totalInv-totalDebt*0.1;
  const liqRatio=(totalCash+totalInv)/(totalDebt*0.2+totalLoans*0.1)*100;
  const shortInv=sum(INVESTMENTS.filter(i=>i.days<=90),"principal");
  const shortDebt=sum(BORROWINGS.filter(b=>b.type!=="Intercompany Loan"),"outstanding")*0.15;
  document.getElementById("panel-liquidity").innerHTML=`
  <div class="sec-head"><div class="sec-title">Liquidity Management</div><div class="sec-sub">Net liquidity position &middot; Cash flow forecast &middot; Gap analysis</div></div>
  <div class="kpi-grid kpi-grid-4">
    ${kpi("Net Liquidity",fmt(netLiq),"",C.teal,2.1)}
    ${kpi("Liquidity Ratio",pct(liqRatio),"Liquid assets / obligations",C.green)}
    ${kpi("30d Cash Forecast",fmt(LIQ_CUM[1]),"Projected balance",C.blue)}
    ${kpi("90d Gap",fmt(LIQ_NET[3]),LIQ_NET[3]<0?"Deficit":"Surplus",LIQ_NET[3]<0?C.red:C.green)}
  </div>
  <div class="card"><div class="card-label">180-Day Liquidity Forecast — Net Flow &amp; Cumulative (₦M)</div><canvas id="ch-liq-fcast" height="190"></canvas></div>
  <div class="card"><div class="card-label">Liquidity Gap — Inflows vs. Outflows by Period (₦M)</div><canvas id="ch-liq-gap" height="190"></canvas></div>
  <div class="grid-2">
    <div class="card" style="margin:0"><div class="card-label">Liquidity Sources</div>
      ${[[fmt(sum(CASH.filter(a=>!a.restricted&&a.ccy==="NGN"),"balance")),"Unrestricted Cash",C.teal],[fmt(shortInv),"Investment Maturities (<90d)",C.blue],[fmt(totalLoans*.12),"Loan Collections (est.)",C.green]].map(([v,l,col])=>`
      <div class="liq-item"><div class="liq-item-left"><div class="liq-bar-left" style="background:${col}"></div><span class="liq-item-label">${l}</span></div><span class="liq-item-val" style="color:${col}">${v}</span></div>`).join("")}
    </div>
    <div class="card" style="margin:0"><div class="card-label">Liquidity Obligations</div>
      ${[[fmt(shortDebt),"Debt Due (<90d)",C.red],[fmt(45),"Operational Expenses",C.gold],[fmt(120),"Funding Commitments",C.purple]].map(([v,l,col])=>`
      <div class="liq-item"><div class="liq-item-left"><div class="liq-bar-left" style="background:${col}"></div><span class="liq-item-label">${l}</span></div><span class="liq-item-val" style="color:${col}">${v}</span></div>`).join("")}
    </div>
  </div>`;
  setTimeout(()=>{
    makeChart("ch-liq-fcast",{type:"line",data:{labels:LIQ_P,datasets:[{label:"Cumulative (₦M)",data:LIQ_CUM,borderColor:C.blue,backgroundColor:"rgba(76,201,240,.12)",fill:true,tension:.4,pointBackgroundColor:C.blue,pointRadius:3},{label:"Net Flow (₦M)",data:LIQ_NET,borderColor:C.teal,fill:false,tension:.3,borderDash:[5,5],pointBackgroundColor:C.teal,pointRadius:3}]},options:{plugins:{legend:{labels:{color:C.t2}}},scales:{x:{grid:{color:C.border}},y:{grid:{color:C.border}}}}});
    makeChart("ch-liq-gap",{type:"bar",data:{labels:GAP_P,datasets:[{label:"Inflows",data:GAP_IN,backgroundColor:C.green,borderRadius:4},{label:"Outflows",data:GAP_OUT,backgroundColor:C.red,borderRadius:4}]},options:{plugins:{legend:{labels:{color:C.t2}}},scales:{x:{grid:{color:C.border}},y:{grid:{color:C.border}}}}});
  },50);
}

// ── UPLOAD MODAL ───────────────────────────────────────────────────────────────
function openUpload(tab){
  const labels={loans:"Loan Portfolio",borrowings:"Borrowings",investments:"Investment Portfolio",cash:"Cash Balances"};
  document.getElementById("modal-title").textContent="Upload "+labels[tab];
  document.getElementById("modal-body").innerHTML=`<label class="drop-zone" id="drop-zone">
    <div class="drop-icon">&#128194;</div><div class="drop-title">Drop file or click to browse</div><div class="drop-sub">Max 5MB &middot; CSV or XLSX</div>
    <input type="file" accept=".csv,.xlsx" style="display:none" onchange="handleFile(this)"/>
  </label>`;
  document.getElementById("upload-modal").classList.add("show");
}
function closeUpload(){document.getElementById("upload-modal").classList.remove("show");}
function handleFile(inp){
  const file=inp.files[0]; if(!file)return;
  document.getElementById("modal-body").innerHTML='<div style="text-align:center;padding:32px"><div style="font-size:28px;color:var(--teal)">&#8635;</div><div style="color:var(--t2);margin-top:10px;font-size:13px">Validating data...</div></div>';
  setTimeout(()=>{
    document.getElementById("modal-body").innerHTML=`
    <div class="upload-log">
      <div class="log-row"><span class="log-ok">&#10003;</span><span class="log-row-num">Row 1</span><span style="color:var(--t2)">Validated successfully</span></div>
      <div class="log-row"><span class="log-ok">&#10003;</span><span class="log-row-num">Row 2</span><span style="color:var(--t2)">Validated successfully</span></div>
      <div class="log-row"><span class="log-warn">&#9888;</span><span class="log-row-num">Row 3</span><span style="color:var(--t2)">Warning: Rate field missing — defaulted to 0%</span></div>
    </div>
    <button class="confirm-btn" onclick="confirmUpload()">Confirm Import</button>`;
  },1100);
}
function confirmUpload(){
  document.getElementById("modal-body").innerHTML='<div style="text-align:center;padding:28px"><div style="font-size:36px">&#9989;</div><div style="color:var(--green);font-size:13px;margin-top:10px">Data imported successfully</div></div>';
  setTimeout(closeUpload,1500);
}

// ── INIT ───────────────────────────────────────────────────────────────────────
renderStatusBar();
renderDashboard();
rendered["dashboard"]=true;
</script>
</body>
</html>
